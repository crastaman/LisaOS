# LisaOS Provider Resolution Map
#
# Machine-readable logical -> physical provider resolution.
# Source of truth for turning a logical provider name into the concrete OpenClaw
# model + runtime that must be written into a subagent spawn payload's `model` field.
#
# Fixes EXECUTION_LAYER_AUDIT.md Defects A/B/C. Consumed by core/provider_resolver.py.
#
# DISAMBIGUATION RULE (S024 provider clean-up):
#   Every provider has a SINGLE, unambiguous identity. There is no bare `qwen`.
#   There is exactly ONE approved Qwen backend:
#     * qwen-deepinfra  -> Qwen on DeepInfra   (the only approved Qwen)
#   A logical name NEVER maps to more than one backend, and always resolves
#   deterministically.
#
# REGISTRY CLEANUP (V3 workforce validation, 2026-07-07):
#   The Alibaba (Ali Model Studio) Qwen provider was REMOVED from the approved
#   workforce. Its backend (codex-model-studio/qwen3.7-plus) is a China-region,
#   403-prone endpoint whose OpenClaw provider is misleadingly named
#   `codex-model-studio` (it serves Qwen, not Codex) -> Codex/Qwen naming
#   ambiguity. No registry entry references codex-model-studio any longer, so
#   `codex` unambiguously means OpenAI Codex. See docs/LISAOS/V3/15 and /18.
#
# Physical model IDs and credential descriptors mirror ~/.openclaw/openclaw.json.

version: 2
schema: lisaos.provider_resolution.v2
last_updated: 2026-07-07
owner: LisaOS

# ---------------------------------------------------------------------------
# credential.type:
#   oauth          -> requires an OpenClaw auth profile with matching `provider` and mode: oauth
#   inline_api_key -> requires a non-empty apiKey on the openclaw.json provider block
#                     (a ${ENV} placeholder is only satisfied when that env var is set)
#   api_key        -> requires `env` to be set, OR an inline apiKey on `openclaw_provider`
# ---------------------------------------------------------------------------
providers:

  deepseek:
    physical_model: custom-api-deepseek-com/deepseek-reasoner
    runtime: openclaw
    provider_id: custom-api-deepseek-com
    role_hint: bulk-implementation
    credential:
      type: inline_api_key
      openclaw_provider: custom-api-deepseek-com
    aliases: [deepseek-reasoner, ds]

  claude-opus:
    physical_model: anthropic/claude-opus-4-8
    runtime: claude-cli
    provider_id: anthropic
    role_hint: architecture-and-review
    credential:
      type: oauth
      provider: claude-cli
    aliases: [opus, claude, claude-opus-4-8]

  claude-sonnet:
    physical_model: anthropic/claude-sonnet-4-6
    runtime: claude-cli
    provider_id: anthropic
    role_hint: review-and-implementation
    credential:
      type: oauth
      provider: claude-cli
    aliases: [sonnet, claude-sonnet-4-6]

  codex:
    physical_model: openai/gpt-5.5
    runtime: codex
    provider_id: openai
    role_hint: sandboxed-engineering
    credential:
      type: oauth
      provider: openai
    aliases: [openai-codex]

  gpt:
    physical_model: openai/gpt-5.5
    runtime: openclaw
    provider_id: openai
    role_hint: governance-and-planning
    credential:
      type: oauth
      provider: openai
    aliases: [governance, gpt-5.5]

  # Qwen on DeepInfra. Requires DEEPINFRA_API_KEY (env-only; never committed).
  # Until the key is present this resolves UNAVAILABLE and fails closed.
  qwen-deepinfra:
    physical_model: deepinfra/Qwen/Qwen3.6-35B-A3B
    runtime: openclaw
    provider_id: deepinfra
    role_hint: large-context-mechanical
    credential:
      type: api_key
      env: DEEPINFRA_API_KEY
      openclaw_provider: deepinfra
    aliases: [deepinfra-qwen]

  # NOTE: The Alibaba (Ali Model Studio) Qwen provider `qwen-alibaba`
  # (codex-model-studio/qwen3.7-plus) was REMOVED in the V3 registry cleanup.
  # It is NOT part of the approved workforce. Do not re-add it without approval.
  # Huge-context (>200k) work routes to gpt-5.4-pro / deepinfra DeepSeek-V4-Flash
  # instead. See docs/LISAOS/V3/18_PROVIDER_REGISTRY_AUDIT_AND_CLEANUP.md.

# ---------------------------------------------------------------------------
# Fallback policy.
#
# DEFAULT: disabled -> the resolver FAILS CLOSED. An unresolved, unavailable, or
# unauthenticated provider raises an error. It NEVER silently substitutes DeepSeek.
#
# When enabled, each chain lists explicit, allowed fallbacks for a logical provider.
# Any fallback taken is recorded in the resolution evidence (fallback_from + reason).
# DeepSeek must never appear as an implicit fallback; it may only be an explicit,
# policy-listed, recorded chain entry.
# ---------------------------------------------------------------------------
fallback_policy:
  enabled: false
  chains: {}
