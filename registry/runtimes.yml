# LisaOS Runtime Registry
# L001.5 governance refinement. Placeholders only; no API keys or secrets.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ SUPERSEDED (LisaOS 3.0 Phase 1).                                          │
# │ This runtime/cost_tier abstraction is the legacy routing layer. Its       │
# │ logical runtimes (gpt-governance, deepseek-planning, claude-review,       │
# │ codex-review) and the single `cost_tier` scalar are replaced by:          │
# │   * registry/employees.yml         (employees + two-currency cost class)   │
# │   * registry/provider_resolution.yml (logical -> physical, fail-closed)    │
# │   * core/workforce_resolver.py      (capability -> employee -> model)       │
# │ Kept for COMPATIBILITY only; do not build new routing on it. Scheduled for │
# │ retirement in a later phase. See docs/LISAOS/V3/21_WORKFORCE_RESOLVER_REPORT.md │
# └─────────────────────────────────────────────────────────────────────────┘

registry:
  name: runtimes
  version: 1.0.0
  schema: lisaos.registry.runtimes.v1
  last_updated: 2026-07-02
  owner: LisaOS
  status: active

runtimes:
  - id: gpt-governance
    status: active
    owner: LisaOS
    policy_profile: runtime-standard
    provider: openai
    runtime_profile: governance-runtime
    role: governance, orchestration, policy reasoning, and general LisaOS coordination
    capabilities:
      - planning
      - documentation
      - governance
      - review
    cost_tier: medium
    fallback_for:
      - deepseek-planning
      - claude-review
    notes: Default governance-oriented runtime placeholder for LisaOS coordination. Future resolver work should route through runtime_profile rather than hard-coding this runtime id.

  - id: deepseek-planning
    status: active
    owner: LisaOS
    policy_profile: runtime-standard
    provider: deepseek
    runtime_profile: planning-runtime
    role: planning, decomposition, migration strategy, and architecture analysis
    capabilities:
      - planning
      - architecture_review
      - documentation
    cost_tier: low
    fallback_for:
      - gpt-governance
    notes: Planning runtime placeholder for deeper structured reasoning tasks. Future abstraction should expose this as a planning-runtime candidate.

  - id: claude-review
    status: active
    owner: LisaOS
    policy_profile: runtime-standard
    provider: anthropic
    runtime_profile: review-runtime
    role: review, documentation quality, architecture guardrails, and security-sensitive analysis
    capabilities:
      - review
      - documentation
      - architecture_review
      - security_review
    cost_tier: high
    fallback_for:
      - codex-review
    notes: Review-oriented runtime placeholder. Future abstraction should expose this as a review-runtime candidate.

  - id: codex-review
    status: active
    owner: LisaOS
    policy_profile: runtime-standard
    provider: openai
    runtime_profile: implementation-runtime
    role: code review, implementation assistance, repository inspection, and patch validation
    capabilities:
      - code_review
      - implementation
      - validation
      - repository_operations
    cost_tier: medium
    fallback_for:
      - glm-builder-future
    notes: Engineering runtime placeholder for implementation and review work. Future abstraction should expose this as an implementation-runtime candidate.

  - id: glm-builder-trial
    status: trial
    owner: LisaOS
    policy_profile: runtime-standard
    provider: zhipu
    runtime_profile: implementation-runtime
    role: trial builder runtime for GLM evaluation; implementation and code transformation tasks (trial phase)
    capabilities:
      - implementation
      - code_generation
      - validation
    cost_tier: unknown
    fallback_for:
      - codex-review
    notes: GLM evaluation active. Trial phase — not for production use. Provider configured in OpenClaw. API key required to complete setup.
